case:
  name: case_4die_stress
  description: Abstract 4-die mechanism-validation workload for PTV-aware scheduling constraints.

simulation:
  time_step_s: 0.0002
  clock_hz: 1000000

thermal:
  ambient_temp_c: 25.0
  thermal_resistance_c_per_w: 1.0
  thermal_capacitance_j_per_c: 0.010
  max_temp_c: 26.15

voltage:
  nominal_voltage_v: 0.80
  pdn_resistance_ohm: 0.050
  mode: shared
  max_ir_drop_v: 0.160

scheduler:
  max_concurrent_capture: 1
  dummy_cycle_duration_s: 0.0002
  max_dummy_cycles_per_block: 80

stack:
  dies:
    - id: 0
      name: stress_die0_logic_base
      layer_index: 0
      area_mm2: 45.0
      initial_temp_c: 25.55
      nominal_power_w: 0.45
    - id: 1
      name: stress_die1_memory
      layer_index: 1
      area_mm2: 40.0
      initial_temp_c: 25.55
      nominal_power_w: 0.42
    - id: 2
      name: stress_die2_logic
      layer_index: 2
      area_mm2: 42.0
      initial_temp_c: 25.55
      nominal_power_w: 0.44
    - id: 3
      name: stress_die3_sensor_io
      layer_index: 3
      area_mm2: 38.0
      initial_temp_c: 25.55
      nominal_power_w: 0.38

access:
  ptap_width_bits: 1
  stap_count: 4
  fpp_enabled: true
  fpp_lanes: 2
  fpp_lane_width_bits: 1
  dwr_segments:
    - die_id: 0
      name: dwr_die0
      length_bits: 384
    - die_id: 1
      name: dwr_die1
      length_bits: 320
    - die_id: 2
      name: dwr_die2
      length_bits: 352
    - die_id: 3
      name: dwr_die3
      length_bits: 288

tasks:
  - id: instrument_access_die0
    die_id: 0
    task_type: instrument_access
    duration_cycles: 400
    access_width_bits: 1
    power_w: 0.20
    fpp_lanes_required: 0
    dwr_segment: DWR_NONE
  - id: bist_die0
    die_id: 0
    task_type: bist
    duration_cycles: 3000
    access_width_bits: 1
    power_w: 1.60
    fpp_lanes_required: 0
    dwr_segment: DWR_NONE
  - id: dwr_extest_die0_die1
    die_id: 0
    task_type: dwr_extest
    duration_cycles: 1800
    access_width_bits: 1
    power_w: 1.10
    fpp_lanes_required: 1
    dwr_segment: dwr_die0_die1
  - id: scan_shift_die0_a
    die_id: 0
    task_type: scan
    duration_cycles: 2800
    access_width_bits: 1
    power_w: 1.60
    fpp_lanes_required: 1
    dwr_segment: dwr_die0
  - id: scan_shift_die0_b
    die_id: 0
    task_type: scan
    duration_cycles: 2600
    access_width_bits: 1
    power_w: 1.50
    fpp_lanes_required: 1
    dwr_segment: dwr_die0
  - id: scan_capture_die0
    die_id: 0
    task_type: scan
    duration_cycles: 1200
    access_width_bits: 1
    power_w: 1.80
    fpp_lanes_required: 1
    dwr_segment: dwr_die0
    is_capture_phase: true
    dependencies:
      - scan_shift_die0_a
      - scan_shift_die0_b

  - id: instrument_access_die1
    die_id: 1
    task_type: instrument_access
    duration_cycles: 400
    access_width_bits: 1
    power_w: 0.20
    fpp_lanes_required: 0
    dwr_segment: DWR_NONE
  - id: bist_die1
    die_id: 1
    task_type: bist
    duration_cycles: 3000
    access_width_bits: 1
    power_w: 1.55
    fpp_lanes_required: 0
    dwr_segment: DWR_NONE
  - id: dwr_extest_die1_die2
    die_id: 1
    task_type: dwr_extest
    duration_cycles: 1800
    access_width_bits: 1
    power_w: 1.10
    fpp_lanes_required: 1
    dwr_segment: dwr_die1_die2
  - id: scan_shift_die1_a
    die_id: 1
    task_type: scan
    duration_cycles: 2800
    access_width_bits: 1
    power_w: 1.55
    fpp_lanes_required: 1
    dwr_segment: dwr_die1
  - id: scan_shift_die1_b
    die_id: 1
    task_type: scan
    duration_cycles: 2600
    access_width_bits: 1
    power_w: 1.45
    fpp_lanes_required: 1
    dwr_segment: dwr_die1
  - id: scan_capture_die1
    die_id: 1
    task_type: scan
