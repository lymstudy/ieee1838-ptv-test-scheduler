case:
  name: case_4die
  description: Abstract 4-die IEEE 1838 access and PTV model scaffold.

stack:
  dies:
    - id: 0
      name: die0_logic_base
      layer_index: 0
      area_mm2: 45.0
      initial_temp_c: 25.0
      nominal_power_w: 0.35
    - id: 1
      name: die1_memory
      layer_index: 1
      area_mm2: 40.0
      initial_temp_c: 25.0
      nominal_power_w: 0.28
    - id: 2
      name: die2_logic
      layer_index: 2
      area_mm2: 42.0
      initial_temp_c: 25.0
      nominal_power_w: 0.33
    - id: 3
      name: die3_sensor_io
      layer_index: 3
      area_mm2: 38.0
      initial_temp_c: 25.0
      nominal_power_w: 0.24

access:
  ptap_width_bits: 1
  stap_count: 4
  fpp_enabled: true
  fpp_lanes: 2
  fpp_lane_width_bits: 1
  dwr_segments:
    - die_id: 0
      name: dwr_die0
      length_bits: 256
    - die_id: 1
      name: dwr_die1
      length_bits: 192
    - die_id: 2
      name: dwr_die2
      length_bits: 224
    - die_id: 3
      name: dwr_die3
      length_bits: 160

tasks:
  - id: scan_die0
    die_id: 0
    task_type: scan
    duration_cycles: 200000
    access_width_bits: 1
    power_w: 0.62
  - id: bist_die1
    die_id: 1
    task_type: bist
    duration_cycles: 120000
    access_width_bits: 1
    power_w: 0.45
  - id: dwr_extest_die2
    die_id: 2
    task_type: dwr_extest
    duration_cycles: 150000
    access_width_bits: 1
    power_w: 0.38
  - id: instrument_access_die3
    die_id: 3
    task_type: instrument_access
    duration_cycles: 60000
    access_width_bits: 1
    power_w: 0.20
